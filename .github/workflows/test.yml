name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit kit coherence (forge-doctor)
        run: node install/forge-doctor.js
      - name: Run the kit's test suite
        run: bash profiles/tests/run-tests.sh
